<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Birdie · установка</title>
<meta name="theme-color" content="#0E3B2E">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0E3B2E; --ink:#F2E8CE; --dim:#AEC3B2; --accent:#F0C24A; --accent-ink:#123226;
    --card:#123F30; --line:#1F6450;
    --ser:'Fraunces',serif; --ui:'Manrope',sans-serif;
  }
  :root[data-theme="light"]{
    --bg:#F4ECD9; --ink:#14533F; --dim:#4C6B57; --accent:#16614A; --accent-ink:#F4ECD9;
    --card:#EFE6CE; --line:#D8CBA8;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--bg);color:var(--ink);font-family:var(--ui);line-height:1.5;
    -webkit-font-smoothing:antialiased;transition:background .4s,color .4s;
    padding:calc(58px + env(safe-area-inset-top,0px)) 20px 40px}
  .topbar-bg{position:fixed;top:0;left:0;right:0;height:calc(52px + env(safe-area-inset-top,0px));background:var(--bg);z-index:9;transition:background .4s}
  .brandmark{position:fixed;top:calc(14px + env(safe-area-inset-top,0px));left:18px;width:26px;height:26px;z-index:10}
  .topctrl{position:fixed;top:calc(15px + env(safe-area-inset-top,0px));right:16px;z-index:10;display:flex;align-items:center;gap:10px}
  .themebtn{background:none;border:none;color:var(--dim);font-size:16px;cursor:pointer;padding:4px}
  .langbar{display:flex;gap:5px}
  .langbar button{background:none;border:1px solid transparent;color:var(--dim);font-size:12px;letter-spacing:.06em;
    padding:5px 7px;border-radius:999px;cursor:pointer;text-transform:uppercase;font-family:var(--ui)}
  .langbar button.on{color:var(--accent);border-color:var(--accent)}
  .wrap{max-width:520px;margin:0 auto}
  h1{font-family:var(--ser);font-weight:600;font-size:clamp(22px,5vw,28px);margin-bottom:6px;text-align:center}
  .lead{text-align:center;color:var(--dim);margin-bottom:26px}
  .tabs{display:flex;gap:8px;margin-bottom:18px}
  .tab{flex:1;padding:12px;border:1px solid var(--line);border-radius:12px;background:none;color:var(--dim);
    font-family:var(--ui);font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px}
  .tab.on{background:var(--card);color:var(--ink);border-color:var(--accent)}
  .panel{display:none;background:var(--card);border:1px solid var(--line);border-radius:16px;padding:20px}
  .panel.on{display:block}
  ol{list-style:none;counter-reset:s}
  li{counter-increment:s;padding:11px 0 11px 42px;position:relative;border-bottom:1px solid var(--line)}
  li:last-child{border-bottom:none}
  li::before{content:counter(s);position:absolute;left:0;top:10px;width:28px;height:28px;border-radius:50%;
    background:var(--accent);color:var(--accent-ink);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600}
  b{color:var(--accent)}
  footer{margin-top:30px;text-align:center;font-size:12px;color:var(--dim)}
  footer a{color:var(--dim)}
  @media (prefers-reduced-motion: reduce){body{transition:none}}
</style>
</head>
<body>
<div class="topbar-bg"></div>
<a class="brandmark" id="brandmark" href="https://ikartuzov-hub.github.io/birdie/" aria-label="Birdie">
  <svg viewBox="0 0 100 100" fill="none" stroke="var(--accent)" stroke-width="7" stroke-linecap="round" stroke-linejoin="round">
    <path d="M33 16 L33 72"/><path d="M33 16 C57 16 57 42 35 43 C59 44 59 72 33 72"/><path d="M20 86 Q30 80 40 86 Q50 92 60 86 Q70 80 80 86"/>
  </svg>
</a>
<div class="topctrl">
  <button class="themebtn" id="themeBtn" aria-label="theme">☀</button>
  <div class="langbar" id="langbar"></div>
</div>

<div class="wrap">
  <h1 id="h1"></h1>
  <p class="lead" id="lead"></p>
  <div class="tabs">
    <button class="tab on" id="tabA" data-os="ios"></button>
    <button class="tab" id="tabB" data-os="android"></button>
  </div>
  <div class="panel on" id="panel-ios"><ol id="list-ios"></ol></div>
  <div class="panel" id="panel-android"><ol id="list-android"></ol></div>
  <footer>© <a href="https://www.linkedin.com/in/igor-kartuzov/" target="_blank" rel="noopener">Igor Kartuzov</a> · <a id="hubLink">SeedWave</a></footer>
</div>

<script>
const HUB="https://ikartuzov-hub.github.io/seedwave-catalog/hub/";
const APP="https://ikartuzov-hub.github.io/birdie/";
const T={
 ru:{h1:"Установи Birdie на телефон ⛳",lead:"Будет как обычная иконка приложения",ios:"iPhone",android:"Android",
  iosSteps:["Открой ссылку в <b>Safari</b>","Нажми <b>«Поделиться»</b> (квадрат со стрелкой ↑ внизу)","Выбери <b>«На экран Домой»</b>","Готово — значок Birdie на экране"],
  andSteps:["Открой ссылку в <b>Chrome</b>","Нажми <b>⋮</b> (три точки вверху справа)","Выбери <b>«Добавить на главный экран»</b>","Готово — значок Birdie на экране"]},
 pt:{h1:"Instala o Birdie no telemóvel ⛳",lead:"Fica como um ícone normal de app",ios:"iPhone",android:"Android",
  iosSteps:["Abre o link no <b>Safari</b>","Toca em <b>«Partilhar»</b> (quadrado com seta ↑ em baixo)","Escolhe <b>«Adicionar ao ecrã principal»</b>","Pronto — o ícone Birdie no ecrã"],
  andSteps:["Abre o link no <b>Chrome</b>","Toca em <b>⋮</b> (três pontos em cima à direita)","Escolhe <b>«Adicionar ao ecrã principal»</b>","Pronto — o ícone Birdie no ecrã"]},
 en:{h1:"Install Birdie on your phone ⛳",lead:"It works like a normal app icon",ios:"iPhone",android:"Android",
  iosSteps:["Open the link in <b>Safari</b>","Tap <b>«Share»</b> (square with ↑ arrow at the bottom)","Choose <b>«Add to Home Screen»</b>","Done — the Birdie icon is on your screen"],
  andSteps:["Open the link in <b>Chrome</b>","Tap <b>⋮</b> (three dots, top right)","Choose <b>«Add to Home screen»</b>","Done — the Birdie icon is on your screen"]},
 de:{h1:"Installiere Birdie auf dem Handy ⛳",lead:"Wie ein normales App-Symbol",ios:"iPhone",android:"Android",
  iosSteps:["Öffne den Link in <b>Safari</b>","Tippe auf <b>«Teilen»</b> (Quadrat mit Pfeil ↑ unten)","Wähle <b>«Zum Home-Bildschirm»</b>","Fertig — das Birdie-Symbol ist da"],
  andSteps:["Öffne den Link in <b>Chrome</b>","Tippe auf <b>⋮</b> (drei Punkte, oben rechts)","Wähle <b>«Zum Startbildschirm hinzufügen»</b>","Fertig — das Birdie-Symbol ist da"]},
 es:{h1:"Instala Birdie en tu móvil ⛳",lead:"Funciona como un icono normal",ios:"iPhone",android:"Android",
  iosSteps:["Abre el enlace en <b>Safari</b>","Toca <b>«Compartir»</b> (cuadrado con flecha ↑ abajo)","Elige <b>«Añadir a pantalla de inicio»</b>","Listo — el icono de Birdie en tu pantalla"],
  andSteps:["Abre el enlace en <b>Chrome</b>","Toca <b>⋮</b> (tres puntos, arriba a la derecha)","Elige <b>«Añadir a pantalla de inicio»</b>","Listo — el icono de Birdie en tu pantalla"]}
};
const p=new URLSearchParams(location.search);
let lang=p.get("lang"); if(!T[lang]){const n=(navigator.language||"ru").slice(0,2);lang=T[n]?n:"ru";}
let theme=(p.get("theme")==="day"||p.get("theme")==="light")?"day":"night";
const $=i=>document.getElementById(i);
function links(){
  $("hubLink").href=HUB+"?lang="+lang;
  $("brandmark").href=APP+"?lang="+lang+"&theme="+theme;
}
function render(){
 const L=T[lang];document.documentElement.lang=lang;
 $("h1").textContent=L.h1;$("lead").textContent=L.lead;
 $("tabA").textContent="📱 "+L.ios;$("tabB").textContent="🤖 "+L.android;
 $("list-ios").innerHTML=L.iosSteps.map(s=>"<li>"+s+"</li>").join("");
 $("list-android").innerHTML=L.andSteps.map(s=>"<li>"+s+"</li>").join("");
 const bar=$("langbar");bar.innerHTML="";
 Object.keys(T).forEach(c=>{const b=document.createElement("button");b.textContent=c;if(c===lang)b.classList.add("on");
   b.onclick=()=>{const u=new URL(location.href);u.searchParams.set("lang",c);u.searchParams.set("theme",theme);location.href=u;};bar.appendChild(b);});
 links();
}
function setTheme(t){theme=t;
 if(t==="day")document.documentElement.setAttribute("data-theme","light");
 else document.documentElement.removeAttribute("data-theme");
 $("themeBtn").textContent=t==="day"?"☾":"☀";
 try{localStorage.setItem("birdie_theme",t);}catch(e){}
 links();
}
document.querySelectorAll(".tab").forEach(t=>t.onclick=function(){
 document.querySelectorAll(".tab").forEach(x=>x.classList.remove("on"));
 document.querySelectorAll(".panel").forEach(x=>x.classList.remove("on"));
 this.classList.add("on");$("panel-"+this.dataset.os).classList.add("on");
});
$("themeBtn").onclick=()=>setTheme(theme==="day"?"night":"day");
if(!p.get("theme")){try{const s=localStorage.getItem("birdie_theme");if(s==="day"||s==="night")theme=s;}catch(e){}}
render();setTheme(theme);
</script>
</body>
</html>
